<!DOCTYPE html>
<html lang="tr">

  <head>
    <meta charset="UTF-8">
    <title>Translate with Denis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-family: 'Inter', sans-serif;
        font-size: 16px;
      }

      body {
        min-height: 100vh;
        padding: 40px 20px;
        background: linear-gradient(180deg, #eff3f8 0%, #f8fbff 100%);
        color: #1f2937;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.12), transparent 26%),
                    radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.08), transparent 22%);
        pointer-events: none;
        z-index: 0;
      }

      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
        margin-bottom: 32px;
        position: relative;
        z-index: 1;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo {
        width: 52px;
        height: 52px;
        flex-shrink: 0;
      }

      .logo svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .header h1 {
        font-size: clamp(1.75rem, 2vw, 2.25rem);
        font-weight: 700;
        color: #111827;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }

      .header p {
        font-size: 0.95rem;
        color: #4b5563;
        letter-spacing: 0.03em;
        max-width: 520px;
      }

      .card {
        max-width: 960px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 28px;
        overflow: hidden;
        position: relative;
        z-index: 1;
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 28px 90px rgba(15, 23, 42, 0.08);
      }

      .lang-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px;
        background: #f8fafc;
      }

      .lang-btn {
        flex: 1;
        min-width: 120px;
        padding: 14px 20px;
        font-size: 0.98rem;
        font-weight: 600;
        color: #1f2937;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        cursor: pointer;
        transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      }

      .lang-btn.right {
        color: #6b7280;
        text-align: right;
      }

      .lang-btn:not(.active):hover {
        border-color: #cbd5e1;
      }

      .lang-btn.active {
        color: #1d4ed8;
        border-color: #1d4ed8;
        background: #eff6ff;
      }

      .lang-divider {
        padding: 0 4px;
      }

      #swapBtn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid #e5e7eb;
        background: #ffffff;
        cursor: pointer;
        font-size: 18px;
        color: #2563eb;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      #swapBtn:hover {
        transform: scale(1.02);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
      }

      #swapBtn:focus-visible {
        outline: 2px solid #2563eb;
        outline-offset: 2px;
      }

      .lang-hint {
        font-size: 0.88rem;
        color: #6b7280;
        text-align: center;
        padding: 10px 16px 0;
      }

      .lang-hint kbd {
        font-family: 'Inter', sans-serif;
        font-size: 0.82rem;
        padding: 4px 8px;
        border-radius: 8px;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        color: #374151;
      }

      .panels {
        display: grid;
        grid-template-columns: 1fr 1px 1fr;
        min-height: 280px;
      }

      .panel {
        padding: 28px;
        position: relative;
      }

      .panel textarea {
        width: 100%;
        min-height: 220px;
        border: 1px solid #e5e7eb;
        outline: none;
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        color: #111827;
        resize: none;
        background: #ffffff;
        line-height: 1.65;
        border-radius: 20px;
        padding: 20px;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .panel textarea:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
      }

      .panel textarea::placeholder {
        color: #9ca3af;
      }

      .panel-divider {
        background: #e5e7eb;
        width: 1px;
      }

      .output-panel {
        background: #f8fafc;
      }

      .output-text {
        font-size: 1rem;
        line-height: 1.75;
        min-height: 220px;
        color: #111827;
        font-weight: 500;
        white-space: pre-wrap;
      }

      .output-text.placeholder {
        color: #9ca3af;
        font-weight: 400;
      }

      .panel-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 28px;
        border-top: 1px solid #e5e7eb;
      }

      .char-count {
        font-size: 0.9rem;
        color: #6b7280;
      }

      .char-count.warning { color: #dc2626; }

      .footer-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      #clearBtn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #6b7280;
        font-size: 14px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        transition: border-color 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      }

      #clearBtn:hover {
        background: #f3f4f6;
        color: #111827;
        border-color: #9ca3af;
      }

      #translateBtn {
        padding: 12px 32px;
        font-size: 0.96rem;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        border: none;
        border-radius: 16px;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      }

      #translateBtn:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 30px rgba(37, 99, 235, 0.2);
      }

      #translateBtn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .loading-dots {
        display: none;
        gap: 8px;
        align-items: center;
        padding: 4px 0;
      }

      .loading-dots span {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #2563eb;
        animation: bounce 1.2s infinite;
      }

      .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
      .loading-dots span:nth-child(3) { animation-delay: 0.32s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.65); opacity: 0.5; }
        40% { transform: scale(1); opacity: 1; }
      }

      .error-msg {
        display: none;
        font-size: 0.95rem;
        color: #b91c1c;
        padding: 14px 24px;
        border-top: 1px solid #fee2e2;
        background: #fef2f2;
      }

      .panel textarea:focus ~ .glow,
      .panel:focus-within .glow {
        opacity: 0.08;
      }

      .glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 22px;
        box-shadow: inset 0 0 30px rgba(37, 99, 235, 0.12);
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      #langFeedback {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        z-index: 100;
        padding: 14px 22px;
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        color: #111827;
        font-size: 0.95rem;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.35s ease, opacity 0.35s ease;
        max-width: min(88vw, 420px);
        text-align: center;
      }

      #langFeedback.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      #langFeedback strong {
        color: #2563eb;
        font-weight: 700;
      }
    </style>

  </head>

  <body>

    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
            <title>Translate with Denis</title>
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a855f7"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
            <rect x="4" y="4" width="56" height="56" rx="14" fill="#16161f" stroke="#2a2a3a" stroke-width="1"/>
            <path d="M22 20h12c7.18 0 13 5.82 13 13s-5.82 13-13 13H22V20z" fill="none" stroke="url(#logoGrad)" stroke-width="2.25" stroke-linejoin="round"/>
            <path d="M38 32h10M43 27l5 5-5 5" fill="none" stroke="#8b8b9a" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1>Translate with Denis</h1>
          <p>Türkçe ↔ English</p>
        </div>
      </div>
    </header>

    <div class="card">

      <div class="lang-bar">
        <button type="button" class="lang-btn active" id="sourceLangBtn" aria-live="polite">Türkçe</button>
        <div class="lang-divider">
          <button type="button" id="swapBtn" title="Dilleri değiştir (Ctrl tuşuna iki kez hızlıca basın)" aria-label="Dilleri değiştir">⇄</button>
        </div>
        <button type="button" class="lang-btn right" id="targetLangBtn">English</button>
      </div>
      <p class="lang-hint" id="swapHint">Kısayol: <kbd>Ctrl</kbd> tuşuna <strong>iki kez hızlıca</strong> basın (çift tıklama)</p>

      <div class="panels">
        <div class="panel">
          <textarea id="wordInput" placeholder="Metin girin..." maxlength="500" aria-label="Kaynak metin"></textarea>
          <div class="glow"></div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel output-panel">
          <div class="loading-dots" id="loadingDots">
            <span></span><span></span><span></span>
          </div>
          <div class="output-text placeholder" id="outputText">Çeviri burada görünecek / The translation will appear here</div>
        </div>
      </div>

      <div class="panel-footer">
        <span class="char-count" id="charCount">0 / 500</span>
        <div class="footer-right">
          <button type="button" id="clearBtn">✕</button>
          <button type="button" id="translateBtn"><span>Çevir/Translate</span></button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg">
        Çeviri yapılamadı. Lütfen internet bağlantınızı kontrol edin / Translation failed. Please check your internet connection.
      </div>

    </div>

    <div id="langFeedback" role="status" aria-live="polite"></div>

    <script>
      const wordInput    = document.getElementById('wordInput');
      const translateBtn = document.getElementById('translateBtn');
      const swapBtn      = document.getElementById('swapBtn');
      const clearBtn     = document.getElementById('clearBtn');
      const outputText   = document.getElementById('outputText');
      const loadingDots  = document.getElementById('loadingDots');
      const errorMsg     = document.getElementById('errorMsg');
      const charCount    = document.getElementById('charCount');
      const sourceLangBtn = document.getElementById('sourceLangBtn');
      const targetLangBtn = document.getElementById('targetLangBtn');
      const langFeedback = document.getElementById('langFeedback');

      let currentSource = 'tr';
      let currentTarget = 'en';
      let translateTimer = null;
      let feedbackTimer = null;
      let lastCtrlDownTime = 0;
      const DOUBLE_CTRL_MS = 400;

      const LABEL = { tr: 'Türkçe', en: 'English' };

      function langLabel(code) {
        return LABEL[code] || code;
      }

      function showLangFeedback(messageHtml) {
        langFeedback.innerHTML = messageHtml;
        langFeedback.classList.add('visible');
        clearTimeout(feedbackTimer);
        feedbackTimer = setTimeout(function() {
          langFeedback.classList.remove('visible');
        }, 2800);
      }

      function swapLanguages(options) {
        const opts = options || {};
        const fromShortcut = !!opts.fromShortcut;

        if (currentSource === 'tr') {
          currentSource = 'en';
          currentTarget = 'tr';
        } else {
          currentSource = 'tr';
          currentTarget = 'en';
        }

        sourceLangBtn.textContent = langLabel(currentSource);
        targetLangBtn.textContent = langLabel(currentTarget);

        const msg =
          '<strong>' + langLabel(currentSource) + '</strong> → <strong>' + langLabel(currentTarget) + '</strong>';
        if (fromShortcut) {
          showLangFeedback('Diller değiştirildi / Languages have been changed (Ctrl çift tıklama): ' + msg);
        } else {
          showLangFeedback('Diller değiştirildi / Languages have been changed: ' + msg);
        }

        if (wordInput.value.trim()) {
          translate();
        }
      }

      wordInput.addEventListener('input', function() {
        const len = wordInput.value.length;
        charCount.textContent = `${len} / 500`;
        charCount.classList.toggle('warning', len > 450);
        clearBtn.style.display = len > 0 ? 'flex' : 'none';
        clearTimeout(translateTimer);
        if (len > 0) {
          translateTimer = setTimeout(translate, 1000);
        } else {
          resetOutput();
        }
      });

      clearBtn.addEventListener('click', function() {
        wordInput.value = '';
        charCount.textContent = '0 / 500';
        clearBtn.style.display = 'none';
        resetOutput();
      });

      swapBtn.addEventListener('click', function() {
        swapLanguages({ fromShortcut: false });
      });

      document.addEventListener('keydown', function(e) {
        const isCtrlKey = e.key === 'Control' || e.code === 'ControlLeft' || e.code === 'ControlRight';

        if (!isCtrlKey) {
          lastCtrlDownTime = 0;
          return;
        }

        if (e.repeat) return;

        const now = Date.now();
        if (lastCtrlDownTime && (now - lastCtrlDownTime) < DOUBLE_CTRL_MS) {
          e.preventDefault();
          swapLanguages({ fromShortcut: true });
          lastCtrlDownTime = 0;
        } else {
          lastCtrlDownTime = now;
        }
      });

      translateBtn.addEventListener('click', translate);

      wordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          translate();
        }
      });

      function resetOutput() {
        outputText.textContent = 'Çeviri burada görünecek / The translation will appear here';
        outputText.classList.add('placeholder');
        errorMsg.style.display = 'none';
        loadingDots.style.display = 'none';
        outputText.style.display = 'block';
      }

      async function translate() {
        const word = wordInput.value.trim();
        if (!word) return;

        loadingDots.style.display = 'flex';
        outputText.style.display = 'none';
        errorMsg.style.display = 'none';
        translateBtn.disabled = true;

        try {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${currentSource}&tl=${currentTarget}&dt=t&q=${encodeURIComponent(word)}`;
          const response = await fetch(url);
          const data = await response.json();
          const result = data[0][0][0];

          outputText.textContent = result;
          outputText.classList.remove('placeholder');
          outputText.style.display = 'block';
        } catch (err) {
          errorMsg.style.display = 'block';
          outputText.style.display = 'block';
        } finally {
          loadingDots.style.display = 'none';
          translateBtn.disabled = false;
        }
      }
    </script>

  </body>
</html>
