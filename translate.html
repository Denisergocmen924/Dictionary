<!DOCTYPE html>
<html lang="tr">

  <head>
    <meta charset="UTF-8">
    <title>Translate with Denis</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background: #0a0a0f;
        min-height: 100vh;
        padding: 40px 20px;
        overflow-x: hidden;
      }

      /* Statik, hafif derinlik (animasyonsuz) */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(120, 40, 200, 0.08) 0%, transparent 55%),
                    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        margin-bottom: 32px;
        position: relative;
        z-index: 1;
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .logo {
        width: 56px;
        height: 56px;
        flex-shrink: 0;
      }

      .logo svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .header h1 {
        font-size: 28px;
        font-weight: 600;
        color: #e8e8ed;
        letter-spacing: -0.03em;
        line-height: 1.2;
      }

      .header p {
        font-size: 12px;
        color: #5c5c6a;
        margin-top: 8px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 500;
      }

      .card {
        max-width: 900px;
        margin: 0 auto;
        background: #13131a;
        border-radius: 16px;
        border: 1px solid #2a2a3a;
        overflow: hidden;
        position: relative;
        z-index: 1;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
      }

      /* Dil bar */
      .lang-bar {
        display: flex;
        align-items: center;
        border-bottom: 1px solid #2a2a3a;
        background: #0f0f18;
      }

      .lang-btn {
        flex: 1;
        padding: 18px 24px;
        font-size: 15px;
        font-weight: 600;
        font-family: 'Space Grotesk', sans-serif;
        background: none;
        border: none;
        cursor: default;
        color: #a855f7;
        border-bottom: 2px solid #a855f7;
        letter-spacing: 0.02em;
        transition: color 0.2s;
      }

      .lang-btn.right {
        color: #888;
        border-bottom: 2px solid transparent;
        text-align: left;
      }

      .lang-divider {
        padding: 0 12px;
      }

      #swapBtn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid #2a2a3a;
        background: #1a1a28;
        cursor: pointer;
        font-size: 16px;
        color: #a855f7;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
      }

      #swapBtn:hover {
        background: #252532;
        color: #c4b5fd;
        border-color: #3f3f52;
      }

      #swapBtn:focus-visible {
        outline: 2px solid #06b6d4;
        outline-offset: 2px;
      }

      .lang-hint {
        font-size: 11px;
        color: #444;
        text-align: center;
        padding: 8px 16px 0;
        letter-spacing: 0.04em;
      }

      .lang-hint kbd {
        font-family: inherit;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        background: #1a1a28;
        border: 1px solid #2a2a3a;
        color: #666;
      }

      /* Paneller */
      .panels {
        display: grid;
        grid-template-columns: 1fr 1px 1fr;
        min-height: 220px;
      }

      .panel {
        padding: 24px;
        position: relative;
      }

      .panel textarea {
        width: 100%;
        height: 160px;
        border: none;
        outline: none;
        font-size: 18px;
        font-family: 'Space Grotesk', sans-serif;
        color: #f0f0f0;
        resize: none;
        background: transparent;
        line-height: 1.6;
        caret-color: #a855f7;
      }

      .panel textarea::placeholder {
        color: #333;
      }

      .panel-divider {
        background: #2a2a3a;
        width: 1px;
      }

      .output-panel {
        background: #0f0f18;
      }

      .output-text {
        font-size: 18px;
        line-height: 1.6;
        min-height: 160px;
        color: #06b6d4;
        font-weight: 500;
        transition: color 0.3s;
      }

      .output-text.placeholder {
        color: #333;
        font-weight: 400;
      }

      /* Alt bar */
      .panel-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        border-top: 1px solid #2a2a3a;
        background: #0f0f18;
      }

      .char-count {
        font-size: 12px;
        color: #444;
        letter-spacing: 0.05em;
      }

      .char-count.warning { color: #f43f5e; }

      .footer-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #clearBtn {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 1px solid #2a2a3a;
        background: #1a1a28;
        color: #555;
        font-size: 12px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }

      #clearBtn:hover {
        background: #f43f5e;
        color: #fff;
        border-color: #f43f5e;
      }

      #translateBtn {
        padding: 10px 28px;
        font-size: 14px;
        font-weight: 600;
        font-family: 'Space Grotesk', sans-serif;
        background: linear-gradient(135deg, #a855f7, #06b6d4);
        background-size: 200% 200%;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
        letter-spacing: 0.03em;
        position: relative;
        overflow: hidden;
      }

      #translateBtn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #06b6d4, #f43f5e);
        opacity: 0;
        transition: opacity 0.3s;
      }

      #translateBtn:hover::after { opacity: 1; }
      #translateBtn span { position: relative; z-index: 1; }

      #translateBtn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      }

      #translateBtn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      /* Loading */
      .loading-dots {
        display: none;
        gap: 6px;
        align-items: center;
        padding: 4px 0;
      }

      .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }

      .loading-dots span:nth-child(1) { background: #a855f7; }
      .loading-dots span:nth-child(2) { background: #06b6d4; animation-delay: 0.2s; }
      .loading-dots span:nth-child(3) { background: #f43f5e; animation-delay: 0.4s; }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40%            { transform: scale(1.2); opacity: 1; }
      }

      /* Hata */
      .error-msg {
        display: none;
        font-size: 13px;
        color: #f43f5e;
        padding: 10px 24px;
        border-top: 1px solid #2a2a1a;
        background: #1a0f0f;
      }

      /* Yazarken input paneli parlar */
      .panel textarea:focus ~ .glow,
      .panel:focus-within .glow {
        opacity: 1;
      }

      .glow {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 0;
        box-shadow: inset 0 0 30px rgba(168, 85, 247, 0.04);
        opacity: 0;
        transition: opacity 0.3s;
      }

      /* Dil değişimi geri bildirimi */
      #langFeedback {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        z-index: 100;
        padding: 12px 20px;
        border-radius: 12px;
        background: #1a1a28;
        border: 1px solid #2a2a3a;
        color: #e0e0e0;
        font-size: 13px;
        font-weight: 500;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(168, 85, 247, 0.15);
        opacity: 0;
        pointer-events: none;
        transition: transform 0.35s ease, opacity 0.35s ease;
        max-width: min(90vw, 420px);
        text-align: center;
      }

      #langFeedback.visible {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      #langFeedback strong {
        color: #a855f7;
        font-weight: 600;
      }
    </style>

  </head>

  <body>

    <header class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img">
            <title>Translate with Denis</title>
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#a855f7"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </linearGradient>
            </defs>
            <rect x="4" y="4" width="56" height="56" rx="14" fill="#16161f" stroke="#2a2a3a" stroke-width="1"/>
            <path d="M22 20h12c7.18 0 13 5.82 13 13s-5.82 13-13 13H22V20z" fill="none" stroke="url(#logoGrad)" stroke-width="2.25" stroke-linejoin="round"/>
            <path d="M38 32h10M43 27l5 5-5 5" fill="none" stroke="#8b8b9a" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <h1>Translate with Denis</h1>
          <p>Türkçe ↔ İngilizce</p>
        </div>
      </div>
    </header>

    <div class="card">

      <div class="lang-bar">
        <button type="button" class="lang-btn" id="sourceLangBtn" aria-live="polite">Türkçe</button>
        <div class="lang-divider">
          <button type="button" id="swapBtn" title="Dilleri değiştir (Ctrl tuşuna iki kez hızlıca basın)" aria-label="Dilleri değiştir">⇄</button>
        </div>
        <button type="button" class="lang-btn right" id="targetLangBtn">İngilizce</button>
      </div>
      <p class="lang-hint" id="swapHint">Kısayol: <kbd>Ctrl</kbd> tuşuna <strong>iki kez hızlıca</strong> basın (çift tıklama)</p>

      <div class="panels">
        <div class="panel">
          <textarea id="wordInput" placeholder="Metin girin..." maxlength="500" aria-label="Kaynak metin"></textarea>
          <div class="glow"></div>
        </div>
        <div class="panel-divider"></div>
        <div class="panel output-panel">
          <div class="loading-dots" id="loadingDots">
            <span></span><span></span><span></span>
          </div>
          <div class="output-text placeholder" id="outputText">Çeviri burada görünecek</div>
        </div>
      </div>

      <div class="panel-footer">
        <span class="char-count" id="charCount">0 / 500</span>
        <div class="footer-right">
          <button type="button" id="clearBtn">✕</button>
          <button type="button" id="translateBtn"><span>Çevir</span></button>
        </div>
      </div>

      <div class="error-msg" id="errorMsg">
        Çeviri yapılamadı. Lütfen internet bağlantınızı kontrol edin.
      </div>

    </div>

    <div id="langFeedback" role="status" aria-live="polite"></div>

    <script>
      const wordInput    = document.getElementById('wordInput');
      const translateBtn = document.getElementById('translateBtn');
      const swapBtn      = document.getElementById('swapBtn');
      const clearBtn     = document.getElementById('clearBtn');
      const outputText   = document.getElementById('outputText');
      const loadingDots  = document.getElementById('loadingDots');
      const errorMsg     = document.getElementById('errorMsg');
      const charCount    = document.getElementById('charCount');
      const sourceLangBtn = document.getElementById('sourceLangBtn');
      const targetLangBtn = document.getElementById('targetLangBtn');
      const langFeedback = document.getElementById('langFeedback');

      let currentSource = 'tr';
      let currentTarget = 'en';
      let translateTimer = null;
      let feedbackTimer = null;
      let lastCtrlDownTime = 0;
      const DOUBLE_CTRL_MS = 400;

      const LABEL = { tr: 'Türkçe', en: 'İngilizce' };

      function langLabel(code) {
        return LABEL[code] || code;
      }

      function showLangFeedback(messageHtml) {
        langFeedback.innerHTML = messageHtml;
        langFeedback.classList.add('visible');
        clearTimeout(feedbackTimer);
        feedbackTimer = setTimeout(function() {
          langFeedback.classList.remove('visible');
        }, 2800);
      }

      function swapLanguages(options) {
        const opts = options || {};
        const fromShortcut = !!opts.fromShortcut;

        if (currentSource === 'tr') {
          currentSource = 'en';
          currentTarget = 'tr';
        } else {
          currentSource = 'tr';
          currentTarget = 'en';
        }

        sourceLangBtn.textContent = langLabel(currentSource);
        targetLangBtn.textContent = langLabel(currentTarget);

        const msg =
          '<strong>' + langLabel(currentSource) + '</strong> → <strong>' + langLabel(currentTarget) + '</strong>';
        if (fromShortcut) {
          showLangFeedback('Diller değiştirildi (Ctrl çift tıklama): ' + msg);
        } else {
          showLangFeedback('Diller değiştirildi: ' + msg);
        }

        if (wordInput.value.trim()) {
          translate();
        }
      }

      wordInput.addEventListener('input', function() {
        const len = wordInput.value.length;
        charCount.textContent = `${len} / 500`;
        charCount.classList.toggle('warning', len > 450);
        clearBtn.style.display = len > 0 ? 'flex' : 'none';
        clearTimeout(translateTimer);
        if (len > 0) {
          translateTimer = setTimeout(translate, 1000);
        } else {
          resetOutput();
        }
      });

      clearBtn.addEventListener('click', function() {
        wordInput.value = '';
        charCount.textContent = '0 / 500';
        clearBtn.style.display = 'none';
        resetOutput();
      });

      swapBtn.addEventListener('click', function() {
        swapLanguages({ fromShortcut: false });
      });

      document.addEventListener('keydown', function(e) {
        const isCtrlKey = e.key === 'Control' || e.code === 'ControlLeft' || e.code === 'ControlRight';

        if (!isCtrlKey) {
          lastCtrlDownTime = 0;
          return;
        }

        if (e.repeat) return;

        const now = Date.now();
        if (lastCtrlDownTime && (now - lastCtrlDownTime) < DOUBLE_CTRL_MS) {
          e.preventDefault();
          swapLanguages({ fromShortcut: true });
          lastCtrlDownTime = 0;
        } else {
          lastCtrlDownTime = now;
        }
      });

      translateBtn.addEventListener('click', translate);

      wordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          translate();
        }
      });

      function resetOutput() {
        outputText.textContent = 'Çeviri burada görünecek';
        outputText.classList.add('placeholder');
        errorMsg.style.display = 'none';
        loadingDots.style.display = 'none';
        outputText.style.display = 'block';
      }

      async function translate() {
        const word = wordInput.value.trim();
        if (!word) return;

        loadingDots.style.display = 'flex';
        outputText.style.display = 'none';
        errorMsg.style.display = 'none';
        translateBtn.disabled = true;

        try {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${currentSource}&tl=${currentTarget}&dt=t&q=${encodeURIComponent(word)}`;
          const response = await fetch(url);
          const data = await response.json();
          const result = data[0][0][0];

          outputText.textContent = result;
          outputText.classList.remove('placeholder');
          outputText.style.display = 'block';
        } catch (err) {
          errorMsg.style.display = 'block';
          outputText.style.display = 'block';
        } finally {
          loadingDots.style.display = 'none';
          translateBtn.disabled = false;
        }
      }
    </script>

  </body>
</html>
